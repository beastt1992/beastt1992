<svg viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(232,197,71,0.05)" stroke-width="1"/>
    </pattern>

    <radialGradient id="glowLeft" cx="25%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#e8c547" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="88%" cy="38%" r="48%">
      <stop offset="0%" stop-color="#e8c547" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAccent" cx="55%" cy="85%" r="28%">
      <stop offset="0%" stop-color="#ff5c3a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="dividerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e8c547" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#e8c547" stop-opacity="0.35"/>
      <stop offset="75%"  stop-color="#e8c547" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8c547" stop-opacity="0"/>
    </linearGradient>

    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,0,0,0.12)"/>
    </pattern>

    <filter id="titleGlow" x="-5%" y="-20%" width="110%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── BASE ── -->
  <rect width="1280" height="400" fill="#0a0a0a"/>
  <rect width="1280" height="400" fill="url(#grid)"/>
  <rect width="1280" height="400" fill="url(#glowLeft)"/>
  <rect width="1280" height="400" fill="url(#glowRight)"/>
  <rect width="1280" height="400" fill="url(#glowAccent)"/>

  <!-- ── RIGHT PANEL ── -->
  <rect x="830" y="0" width="450" height="400" fill="#0c0c0a" opacity="0.75"/>
  <rect x="830" y="0" width="450" height="400" fill="url(#scanlines)" opacity="0.25"/>

  <!-- ── FRAME ── -->
  <rect x="0"    y="0" width="1280" height="2"   fill="#e8c547" opacity="0.6"/>
  <rect x="0"  y="398" width="1280" height="2"   fill="#e8c547" opacity="0.12"/>
  <rect x="0"    y="0" width="3"   height="400"  fill="#e8c547" opacity="0.55"/>
  <rect x="1277" y="0" width="3"   height="400"  fill="#e8c547" opacity="0.12"/>
  <rect x="830"  y="0" width="1"   height="400"  fill="url(#dividerGrad)"/>

  <!-- Corner ticks -->
  <line x1="3"    y1="52" x2="32"   y2="52"  stroke="#e8c547" stroke-width="1" opacity="0.3"/>
  <line x1="3"    y1="348" x2="32"  y2="348" stroke="#e8c547" stroke-width="1" opacity="0.3"/>
  <line x1="1248" y1="52" x2="1277" y2="52"  stroke="#e8c547" stroke-width="1" opacity="0.15"/>
  <line x1="1248" y1="348" x2="1277" y2="348" stroke="#e8c547" stroke-width="1" opacity="0.15"/>

  <!-- ── LEFT: TOP LABEL ── -->
  <text x="48" y="62" font-size="10" fill="#e8c547" opacity="0.35" letter-spacing="4">FREE · MIT LICENSE · AUTOLISP TOOLCHAIN</text>

  <!-- ── LEFT: TITLE ── -->
  <!-- Glow layer for D -->
  <text x="46" y="226" font-size="168" font-weight="700" fill="#e8c547" letter-spacing="-6" filter="url(#titleGlow)" opacity="0.2">D</text>
  <!-- D amber -->
  <text x="46" y="226" font-size="168" font-weight="700" fill="#e8c547" letter-spacing="-6">D</text>
  <!-- BEAST white -->
  <text x="172" y="226" font-size="168" font-weight="700" fill="#e8e6e0" letter-spacing="-6">BEAST</text>

  <!-- Thin gold rule under title -->
  <rect x="48" y="242" width="750" height="1.5" fill="#e8c547" opacity="0.18"/>

  <!-- ── LEFT: TAGLINE — bigger, bolder ── -->
  <text x="50" y="286" font-size="18" font-weight="400" fill="#7a7870" letter-spacing="2">Designer · AutoLISP Developer · Taoyuan, TW</text>

  <!-- ── LEFT: DESCRIPTOR LINE — mission statement ── -->
  <text x="50" y="322" font-size="14" fill="#3e3e3a" letter-spacing="2">Free open-source AutoCAD tools, built for designers.</text>

  <!-- ── LEFT: COMPAT — bottom ── -->
  <text x="50" y="372" font-size="11" fill="#2a2a28" letter-spacing="2">AutoCAD 2014+  ·  BricsCAD  ·  GstarCAD</text>

  <!-- ═══════════════════════
       RIGHT PANEL — reticle identity
       ═══════════════════════ -->

  <!-- Outer ring halos -->
  <circle cx="1055" cy="200" r="158" fill="none" stroke="#e8c547" stroke-width="0.5" opacity="0.05"/>
  <circle cx="1055" cy="200" r="128" fill="none" stroke="#e8c547" stroke-width="0.6" opacity="0.09"/>
  <circle cx="1055" cy="200" r="98"  fill="none" stroke="#e8c547" stroke-width="0.8" opacity="0.15"/>
  <circle cx="1055" cy="200" r="66"  fill="none" stroke="#e8c547" stroke-width="1"   opacity="0.22"/>
  <circle cx="1055" cy="200" r="36"  fill="none" stroke="#e8c547" stroke-width="1.2" opacity="0.32"/>

  <!-- Crosshair lines -->
  <line x1="848"  y1="200" x2="1008" y2="200" stroke="#e8c547" stroke-width="0.8" opacity="0.18"/>
  <line x1="1102" y1="200" x2="1275" y2="200" stroke="#e8c547" stroke-width="0.8" opacity="0.18"/>
  <line x1="1055" y1="20"  x2="1055" y2="153" stroke="#e8c547" stroke-width="0.8" opacity="0.18"/>
  <line x1="1055" y1="247" x2="1055" y2="378" stroke="#e8c547" stroke-width="0.8" opacity="0.18"/>

  <!-- Cardinal tick marks (inner ring) -->
  <line x1="1021" y1="200" x2="1009" y2="200" stroke="#e8c547" stroke-width="2" opacity="0.5"/>
  <line x1="1089" y1="200" x2="1101" y2="200" stroke="#e8c547" stroke-width="2" opacity="0.5"/>
  <line x1="1055" y1="166" x2="1055" y2="154" stroke="#e8c547" stroke-width="2" opacity="0.5"/>
  <line x1="1055" y1="234" x2="1055" y2="246" stroke="#e8c547" stroke-width="2" opacity="0.5"/>

  <!-- Diagonal tick marks at 45° on outer ring -->
  <line x1="1145" y1="110" x2="1154" y2="101" stroke="#e8c547" stroke-width="1" opacity="0.2"/>
  <line x1="965"  y1="110" x2="956"  y2="101" stroke="#e8c547" stroke-width="1" opacity="0.2"/>
  <line x1="1145" y1="290" x2="1154" y2="299" stroke="#e8c547" stroke-width="1" opacity="0.2"/>
  <line x1="965"  y1="290" x2="956"  y2="299" stroke="#e8c547" stroke-width="1" opacity="0.2"/>

  <!-- Center dot -->
  <circle cx="1055" cy="200" r="5"   fill="#e8c547" opacity="0.5"/>
  <circle cx="1055" cy="200" r="2.5" fill="#e8c547" opacity="1"/>

  <!-- Degree labels -->
  <text x="1055" y="52"  font-size="9" fill="#e8c547" opacity="0.22" text-anchor="middle" letter-spacing="2">000°</text>
  <text x="1055" y="360" font-size="9" fill="#e8c547" opacity="0.22" text-anchor="middle" letter-spacing="2">180°</text>
  <text x="910"  y="205" font-size="9" fill="#e8c547" opacity="0.22" text-anchor="middle" letter-spacing="2">270°</text>
  <text x="1202" y="205" font-size="9" fill="#e8c547" opacity="0.22" text-anchor="middle" letter-spacing="2">090°</text>

  <!-- DB monogram — bigger, stronger -->
  <text x="1055" y="215" font-size="44" font-weight="700" fill="#e8c547" text-anchor="middle" opacity="0.5" letter-spacing="2" filter="url(#softGlow)">DB</text>
  <text x="1055" y="215" font-size="44" font-weight="700" fill="#e8c547" text-anchor="middle" opacity="0.6" letter-spacing="2">DB</text>

  <!-- Labels below circle -->
  <text x="1055" y="302" font-size="11" fill="#4a4a46" text-anchor="middle" letter-spacing="5">OPEN SOURCE</text>
  <text x="1055" y="323" font-size="11" fill="#e8c547" text-anchor="middle" letter-spacing="4" opacity="0.45">FREE  ·  FOREVER</text>

  <!-- Top panel label -->
  <text x="1055" y="42" font-size="9" fill="#2c2c2a" text-anchor="middle" letter-spacing="4">BBEAST · GITHUB</text>
  <line x1="878" y1="30" x2="970"  y2="30" stroke="#e8c547" stroke-width="0.5" opacity="0.12"/>
  <line x1="1140" y1="30" x2="1232" y2="30" stroke="#e8c547" stroke-width="0.5" opacity="0.12"/>

  <!-- Dot matrix lower-left of right panel -->
  <g opacity="0.09">
    <circle cx="862" cy="320" r="1.5" fill="#e8c547"/>
    <circle cx="876" cy="320" r="1.5" fill="#e8c547"/>
    <circle cx="890" cy="320" r="1.5" fill="#e8c547"/>
    <circle cx="862" cy="334" r="1.5" fill="#e8c547"/>
    <circle cx="876" cy="334" r="1.5" fill="#e8c547"/>
    <circle cx="890" cy="334" r="1.5" fill="#e8c547"/>
    <circle cx="862" cy="348" r="1.5" fill="#e8c547"/>
    <circle cx="876" cy="348" r="1.5" fill="#e8c547"/>
    <circle cx="890" cy="348" r="1.5" fill="#e8c547"/>
  </g>

</svg>
