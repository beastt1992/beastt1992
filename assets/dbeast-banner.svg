<svg viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(232,197,71,0.06)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow1" cx="75%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#e8c547" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#ff5c3a" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="1280" height="400" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="#0a0a0a"/>
  <rect width="1280" height="400" fill="url(#grid)"/>
  <rect width="1280" height="400" fill="url(#glow1)"/>
  <rect width="1280" height="400" fill="url(#glow2)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1280" height="2" fill="#e8c547" opacity="0.6"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="400" fill="#e8c547" opacity="0.5"/>

  <!-- Corner marks -->
  <line x1="0" y1="40" x2="24" y2="40" stroke="#e8c547" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="360" x2="24" y2="360" stroke="#e8c547" stroke-width="1" opacity="0.4"/>
  <line x1="1256" y1="40" x2="1280" y2="40" stroke="#e8c547" stroke-width="1" opacity="0.4"/>
  <line x1="1256" y1="360" x2="1280" y2="360" stroke="#e8c547" stroke-width="1" opacity="0.4"/>

  <!-- Decorative cross-hairs top-right -->
  <circle cx="1180" cy="80" r="18" fill="none" stroke="#e8c547" stroke-width="0.8" opacity="0.2"/>
  <line x1="1162" y1="80" x2="1198" y2="80" stroke="#e8c547" stroke-width="0.8" opacity="0.2"/>
  <line x1="1180" y1="62" x2="1180" y2="98" stroke="#e8c547" stroke-width="0.8" opacity="0.2"/>

  <!-- Decorative circles -->
  <circle cx="1180" cy="80" r="36" fill="none" stroke="#e8c547" stroke-width="0.5" opacity="0.1"/>
  <circle cx="1180" cy="80" r="58" fill="none" stroke="#e8c547" stroke-width="0.5" opacity="0.07"/>

  <!-- Small dot grid decoration bottom right -->
  <g opacity="0.12">
    <circle cx="1060" cy="300" r="2" fill="#e8c547"/>
    <circle cx="1080" cy="300" r="2" fill="#e8c547"/>
    <circle cx="1100" cy="300" r="2" fill="#e8c547"/>
    <circle cx="1120" cy="300" r="2" fill="#e8c547"/>
    <circle cx="1060" cy="320" r="2" fill="#e8c547"/>
    <circle cx="1080" cy="320" r="2" fill="#e8c547"/>
    <circle cx="1100" cy="320" r="2" fill="#e8c547"/>
    <circle cx="1120" cy="320" r="2" fill="#e8c547"/>
    <circle cx="1060" cy="340" r="2" fill="#e8c547"/>
    <circle cx="1080" cy="340" r="2" fill="#e8c547"/>
    <circle cx="1100" cy="340" r="2" fill="#e8c547"/>
    <circle cx="1120" cy="340" r="2" fill="#e8c547"/>
  </g>

  <!-- Label top-left -->
  <text x="48" y="64" font-family="'Courier New', monospace" font-size="11" fill="#e8c547" opacity="0.5" letter-spacing="3">AUTOLISP TOOLS · FREE · MIT LICENSE</text>

  <!-- MAIN TITLE -->
  <!-- "D" in amber -->
  <text x="48" y="220" font-family="'Courier New', monospace" font-size="148" font-weight="700" fill="#e8c547" letter-spacing="-4">D</text>
  <!-- "BEAST" in white -->
  <text x="152" y="220" font-family="'Courier New', monospace" font-size="148" font-weight="700" fill="#e8e6e0" letter-spacing="-4">BEAST</text>

  <!-- Underline accent -->
  <rect x="48" y="232" width="700" height="2" fill="#e8c547" opacity="0.25"/>

  <!-- Tagline -->
  <text x="50" y="272" font-family="'Courier New', monospace" font-size="15" fill="#7a7870" letter-spacing="2">Free AutoLISP tools built by a designer, for designers.</text>

  <!-- Tool pills -->
  <!-- DiffCheck -->
  <rect x="50" y="306" width="116" height="30" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="50" y="306" width="3" height="30" fill="#e8c547"/>
  <text x="64" y="325" font-family="'Courier New', monospace" font-size="11" fill="#e8c547" letter-spacing="1">DiffCheck</text>

  <!-- DrawingHealthScore -->
  <rect x="178" y="306" width="196" height="30" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="178" y="306" width="3" height="30" fill="#e8c547"/>
  <text x="192" y="325" font-family="'Courier New', monospace" font-size="11" fill="#e8c547" letter-spacing="1">DrawingHealthScore</text>

  <!-- SyncBlock -->
  <rect x="386" y="306" width="108" height="30" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="386" y="306" width="3" height="30" fill="#e8c547"/>
  <text x="400" y="325" font-family="'Courier New', monospace" font-size="11" fill="#e8c547" letter-spacing="1">SyncBlock</text>

  <!-- BatchPDF -->
  <rect x="506" y="306" width="98" height="30" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="506" y="306" width="3" height="30" fill="#e8c547"/>
  <text x="520" y="325" font-family="'Courier New', monospace" font-size="11" fill="#e8c547" letter-spacing="1">BatchPDF</text>

  <!-- Right side: stat block -->
  <text x="940" y="180" font-family="'Courier New', monospace" font-size="11" fill="#3a3a3a" letter-spacing="2" text-anchor="middle">——————————————</text>

  <text x="940" y="214" font-family="'Courier New', monospace" font-size="56" font-weight="700" fill="#e8e6e0" text-anchor="middle">4</text>
  <text x="940" y="238" font-family="'Courier New', monospace" font-size="11" fill="#5a5850" letter-spacing="3" text-anchor="middle">TOOLS</text>

  <line x1="860" y1="258" x2="1020" y2="258" stroke="#2a2a2a" stroke-width="1"/>

  <text x="880" y="284" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#4caf83" text-anchor="middle">FREE</text>
  <text x="880" y="300" font-family="'Courier New', monospace" font-size="9" fill="#3a3830" letter-spacing="2" text-anchor="middle">FOREVER</text>

  <text x="1000" y="284" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#e8e6e0" text-anchor="middle">MIT</text>
  <text x="1000" y="300" font-family="'Courier New', monospace" font-size="9" fill="#3a3830" letter-spacing="2" text-anchor="middle">LICENSE</text>

  <text x="940" y="330" font-family="'Courier New', monospace" font-size="11" fill="#3a3a3a" letter-spacing="2" text-anchor="middle">——————————————</text>

  <!-- Compatible label bottom right -->
  <text x="1232" y="380" font-family="'Courier New', monospace" font-size="10" fill="#3a3830" letter-spacing="1" text-anchor="end">AutoCAD 2014+ · BricsCAD · GstarCAD</text>
</svg>
